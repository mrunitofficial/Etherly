name: Deploy Preview on Pull Request
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    environment:
      name: Preview
      url: ${{ steps.deploy_preview.outputs.details_url }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter clean
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter build apk --release
      - run: flutter build web --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: etherly-preview-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - uses: FirebaseExtended/action-hosting-deploy@v0
        id: deploy_preview
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ETHERLY_FIREBASE }}
          projectId: etherly-firebase
